# Default values for mcp-server.
# Override with: helm install mcp-server ./chart -f my-values.yaml

image:
  # Set to your registry path, e.g. quay.io/myorg/mcp-ocp-server
  repository: "quay.io/springdo/ocp-ci-cd"
  tag: "latest"
  pullPolicy: Always

replicaCount: 1

# Pod annotation: change this (or rely on the default) to force a rolling restart.
# Default is the Helm release revision so each `helm upgrade` rolls pods.
rollme: ""

service:
  port: 8000

# ---------------------------------------------------------------------------
# OpenShift Route — edge TLS termination.  No Ingress resource is created.
# ---------------------------------------------------------------------------
route:
  enabled: true
  # Leave empty to let the OpenShift router assign a hostname automatically.
  host: ""
  tls:
    termination: edge
    # Redirect plain HTTP to HTTPS.
    insecureEdgeTerminationPolicy: Redirect
  # Increase the route timeout for long-running wait_for_build calls.
  # Value must be a duration string understood by HAProxy, e.g. "3600s".
  timeoutAnnotation: "3600s"

# ---------------------------------------------------------------------------
# Workspace storage — used for git clones and Helm chart paths.
# ---------------------------------------------------------------------------
workspace:
  # "emptyDir": ephemeral, lost on pod restart.
  # "pvc": persistent — fills in a PersistentVolumeClaim.
  storageType: emptyDir
  pvc:
    size: 5Gi
    storageClass: ""
    accessMode: ReadWriteOnce

# ---------------------------------------------------------------------------
# Application environment variables.
# ---------------------------------------------------------------------------
env:
  LOG_LEVEL: INFO
  # POD_NAMESPACE is injected automatically via the Downward API — do not set here.
  # API key for MCP endpoint authentication (sent via X-API-Key header).
  # Test-only default; replace for non-test deployments.
  MCP_API_KEY: "daffy-duck"
  # Optional: GitHub PAT for private HTTPS git_clone (see README). Prefer a Secret in production.
  # GITHUB_TOKEN: ""
  # Optional: force oc/helm to use this namespace (default in app: POD_NAMESPACE = pod's namespace).
  # OCP_TARGET_NAMESPACE: "other-ns"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# ---------------------------------------------------------------------------
# RBAC
# ---------------------------------------------------------------------------
rbac:
  # Extra Role rules appended to the default build/helm rules.
  # Use this when your application Helm chart creates resource types not
  # covered by the default Role (e.g. CRDs, ClusterRoles, etc.).
  # All rules are namespaced — ClusterRole bindings are not created.
  #
  # Example:
  #   extraRules:
  #     - apiGroups: ["apps"]
  #       resources: ["statefulsets"]
  #       verbs: ["get", "list", "create", "update", "patch", "delete"]
  extraRules: []
