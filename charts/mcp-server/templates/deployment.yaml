apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mcp-server.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mcp-server.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "mcp-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mcp-server.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "mcp-server.serviceAccountName" . }}
      # OpenShift restricted-v2 SCC: non-root, no privilege escalation.
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mcp-server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: PORT
              value: {{ .Values.service.port | quote }}
            - name: BIND_HOST
              value: "0.0.0.0"
            - name: WORKSPACE_ROOT
              value: "/workspace"
            # POD_NAMESPACE is injected from pod metadata so tools always target
            # the correct namespace without any manual configuration.
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- if .Values.env.LOG_LEVEL }}
            - name: LOG_LEVEL
              value: {{ .Values.env.LOG_LEVEL | quote }}
            {{- end }}
            {{- if .Values.bearerTokenSecret.name }}
            - name: MCP_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bearerTokenSecret.name }}
                  key: {{ .Values.bearerTokenSecret.key | default "token" }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          # TCP socket probe — FastMCP does not expose /healthz by default.
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          volumeMounts:
            - name: workspace
              mountPath: /workspace
      volumes:
        - name: workspace
          {{- if eq .Values.workspace.storageType "pvc" }}
          persistentVolumeClaim:
            claimName: {{ include "mcp-server.fullname" . }}-workspace
          {{- else }}
          emptyDir: {}
          {{- end }}
